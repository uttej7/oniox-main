<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <clipPath id="roundedRect">
      <rect x="5" y="5" width="110" height="110" rx="22" ry="22"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="120" height="120" rx="24" ry="24" fill="#0a0a0a"/>
  <!-- Diagonal color stripe -->
  <polygon points="0,120 120,0 120,30 30,120" fill="#f97316" opacity="0.9" clip-path="url(#roundedRect)"/>
  <polygon points="0,90 90,0 120,0 0,120" fill="#22c55e" opacity="0.85" clip-path="url(#roundedRect)"/>
  <polygon points="0,0 120,0 120,120 0,120" fill="transparent"/>
  <!-- Laptop screen -->
  <rect x="20" y="18" width="80" height="58" rx="8" ry="8" fill="#0a0a0a" stroke="#1e3a8a" stroke-width="4"/>
  <!-- Screen inner -->
  <rect x="26" y="24" width="68" height="46" rx="4" ry="4" fill="#111827"/>
  <!-- Camera dot -->
  <circle cx="60" cy="21" r="3" fill="#f97316"/>
  <!-- Laptop base -->
  <rect x="12" y="76" width="96" height="10" rx="4" ry="4" fill="#0a0a0a" stroke="#1e3a8a" stroke-width="3"/>
  <!-- Touchpad -->
  <rect x="48" y="79" width="24" height="5" rx="2" ry="2" fill="#0ea5e9"/>
</svg>
